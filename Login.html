<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="Login.css">
</head>

<body>

    <h1 class="head">WELCOME</h1>
    <h3 class="head2">Login with Email</h3>

    <form>

        <div>

            <label for="email"
            class="form">

            Email

            </label>

            <input
            id="email"
            type="email"
            class="input"
            placeholder="Email"
            required>

            <label for="password"
            class="form">

            Password

            </label>

            <input
            id="password"
            type="password"
            class="input"
            placeholder="Password"
            required>

        </div>

        <button
        class="button"
        type="button"
        onclick="loginUser()">

        Login

        </button>

    </form>

    <p class="head3">

        Don't have an account?

        <a href="Signup.html"
        class="link">

        Sign Up

        </a>

    </p>

<script>

async function loginUser() {

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    const response =
    await fetch("http://localhost:10000/login", {

        method: "POST",

        headers: {
            "Content-Type":
            "application/json"
        },

        body: JSON.stringify({

            email: email,
            password: password
        })

    });

    const result =
    await response.text();

    if(result ===
    "ADMIN_LOGIN_SUCCESS"
    ||
    result ===
    "STUDENT_LOGIN_SUCCESS") {

        alert("Login Successful");

        window.location.href =
        "Home.html";
    }

    else {

        alert(
        "Invalid Credentials"
        );
    }
}

</script>

</body>
</html>
